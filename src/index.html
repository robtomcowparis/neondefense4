<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Arcade</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --deep:       #040410;
    --panel:      rgba(8, 8, 26, 0.94);
    --card-bg:    #0c0c22;
    --input-bg:   #10102a;
    --subtle-bg:  #1a2233;
    --cyan:       #00ffff;
    --magenta:    #ff00ff;
    --gold:       #ffd700;
    --orange:     #ffaa00;
    --green:      #00ff88;
    --red:        #ff3333;
    --text:       #e8e8f0;
    --text-blue:  #aaccff;
    --text-mid:   #88aacc;
    --text-dim:   #667788;
    --text-dark:  #445566;
    --text-ghost: #334455;
    --border-sub: rgba(0, 180, 200, 0.2);
    --border-card: rgba(100, 120, 180, 0.1);
  }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Consolas', 'Courier New', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Three.js canvas ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
  }

  /* ── Vignette overlay on top of 3D ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at center,
      rgba(4,4,16,0.3) 0%,
      rgba(4,4,16,0.75) 60%,
      rgba(4,4,16,0.95) 100%);
    pointer-events: none;
  }

  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 48px;
  }

  /* ── Title ── */
  .title {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 8px;
    color: var(--cyan);
    text-shadow:
      0 0 10px rgba(0,255,255,0.8),
      0 0 30px rgba(0,255,255,0.5),
      0 0 60px rgba(0,255,255,0.3);
    animation: title-pulse 3s ease-in-out infinite;
    text-align: center;
    margin-bottom: 8px;
  }

  @keyframes title-pulse {
    0%, 100% {
      text-shadow:
        0 0 10px rgba(0,255,255,0.8),
        0 0 30px rgba(0,255,255,0.5),
        0 0 60px rgba(0,255,255,0.3);
    }
    50% {
      text-shadow:
        0 0 15px rgba(0,255,255,1),
        0 0 40px rgba(0,255,255,0.7),
        0 0 80px rgba(0,255,255,0.4),
        0 0 120px rgba(0,255,255,0.2);
    }
  }

  .subtitle {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 12px;
    color: var(--magenta);
    text-shadow:
      0 0 10px rgba(255,0,255,0.6),
      0 0 30px rgba(255,0,255,0.3);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 48px;
  }

  /* ── Divider ── */
  .divider {
    width: 180px;
    height: 1px;
    margin-bottom: 48px;
    background: linear-gradient(90deg, transparent, rgba(0,255,255,0.25), transparent);
  }

  /* ── Game grid ── */
  .games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
    max-width: 860px;
    width: 100%;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border-card);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    color: inherit;
    display: block;
    opacity: 0;
    animation: fadeUp 0.4s ease forwards;
  }

  .card:nth-child(1) { animation-delay: 0.2s; }
  .card:nth-child(2) { animation-delay: 0.35s; }
  .card:nth-child(3) { animation-delay: 0.5s; }
  .card:nth-child(4) { animation-delay: 0.65s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    border-color: rgba(0,255,255,0.35);
    box-shadow:
      0 0 20px rgba(0,255,255,0.15),
      inset 0 0 15px rgba(0,255,255,0.05);
    transform: scale(1.03);
  }

  .card:active {
    transform: scale(0.98);
  }

  /* ── Card art ── */
  .card-art {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: var(--deep);
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--border-card);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-art canvas {
    width: 100%;
    height: 100%;
    display: block;
    transition: filter 0.2s ease;
  }

  .card:hover .card-art canvas {
    filter: brightness(1.3);
  }

  /* ── Card body ── */
  .card-body {
    padding: 18px 20px 22px;
  }

  .card-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Color per card */
  .card[data-accent="cyan"] .card-title {
    color: var(--cyan);
    text-shadow: 0 0 6px rgba(0,255,255,0.4);
  }
  .card[data-accent="magenta"] .card-title {
    color: var(--magenta);
    text-shadow: 0 0 6px rgba(255,0,255,0.4);
  }

  .card-desc {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .card-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 3px;
  }

  .card[data-accent="cyan"] .card-tag {
    color: var(--cyan);
    border: 1px solid rgba(0,255,255,0.25);
    background: rgba(0,255,255,0.06);
  }

  .card[data-accent="magenta"] .card-tag {
    color: var(--magenta);
    border: 1px solid rgba(255,0,255,0.25);
    background: rgba(255,0,255,0.06);
  }

  /* ── Footer ── */
  .footer {
    margin-top: 56px;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-ghost);
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .title { font-size: 38px; letter-spacing: 4px; }
    .subtitle { font-size: 14px; letter-spacing: 6px; margin-bottom: 32px; }
    .page { padding: 40px 16px 32px; }
    .games { gap: 18px; }
    .card-body { padding: 14px 16px 18px; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>

<div class="page">

  <div class="title">NEON ARCADE</div>
  <div class="subtitle">SELECT GAME</div>
  <div class="divider"></div>

  <div class="games">

    <a class="card" href="/game.html" data-accent="cyan">
      <div class="card-art"><canvas id="art-nd4"></canvas></div>
      <div class="card-body">
        <div class="card-title">NEON DEFENSE 4</div>
        <div class="card-desc">Strategic tower defense. Build, research, and hold the line against incoming waves.</div>
        <span class="card-tag">TOWER DEFENSE</span>
      </div>
    </a>

    <a class="card" href="/neon-tanks/" data-accent="magenta">
      <div class="card-art"><canvas id="art-nt"></canvas></div>
      <div class="card-body">
        <div class="card-title">NEON TANKS</div>
        <div class="card-desc">Armored battle royale on a neon battlefield. Upgrade, outmaneuver, eliminate.</div>
        <span class="card-tag">BATTLE ROYALE</span>
      </div>
    </a>

    <!--
    ── ADD MORE GAMES ──
    Copy a card block. Set data-accent to "cyan", "magenta", or add
    new accent styles. Add a canvas draw function in the script below.
    -->

  </div>

  <div class="footer">ROB COWDEN &middot; 2026</div>

</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ════════════════════════════════════════════════
//  3D BACKGROUND — Neon grid with pillars
// ════════════════════════════════════════════════

(function initBackground() {
  const canvas = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.4;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x040410);
  scene.fog = new THREE.FogExp2(0x040410, 0.012);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 28, 45);
  camera.lookAt(0, 0, 0);

  // ── Lighting (from style guide) ──
  scene.add(new THREE.AmbientLight(0x2a2a4e, 0.6));
  const dirLight = new THREE.DirectionalLight(0xd0d8ff, 0.4);
  dirLight.position.set(10, 20, 8);
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0x8888cc, 0.2);
  fillLight.position.set(-8, -4, -6);
  scene.add(fillLight);

  // ── Ground plane ──
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshStandardMaterial({ color: 0x0c0c28, emissive: 0x060618, roughness: 0.85, metalness: 0.3 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.1;
  scene.add(ground);

  // ── Grid lines ──
  const gridGroup = new THREE.Group();
  scene.add(gridGroup);
  const gridSize = 100, gridStep = 4;
  const lineMat = new THREE.LineBasicMaterial({ color: 0x2a5588, transparent: true, opacity: 0.45 });

  for (let i = -gridSize; i <= gridSize; i += gridStep) {
    const gX = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-gridSize, 0, i), new THREE.Vector3(gridSize, 0, i)
    ]);
    gridGroup.add(new THREE.Line(gX, lineMat));
    const gZ = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(i, 0, -gridSize), new THREE.Vector3(i, 0, gridSize)
    ]);
    gridGroup.add(new THREE.Line(gZ, lineMat));
  }

  // ── Intersection dots ──
  const dotPos = [];
  for (let x = -gridSize; x <= gridSize; x += gridStep)
    for (let z = -gridSize; z <= gridSize; z += gridStep)
      dotPos.push(x, 0.02, z);
  const dotGeo = new THREE.BufferGeometry();
  dotGeo.setAttribute('position', new THREE.Float32BufferAttribute(dotPos, 3));
  gridGroup.add(new THREE.Points(dotGeo,
    new THREE.PointsMaterial({ color: 0x4488bb, size: 0.15, transparent: true, opacity: 0.5 })
  ));

  // ── Neon pillars ──
  const pillars = [
    { x: -18, z: -12, h: 6, c: 0x00ffff },
    { x: 10,  z: -20, h: 8, c: 0xff00ff },
    { x: -8,  z: 14,  h: 5, c: 0x00ffff },
    { x: 22,  z: 8,   h: 7, c: 0xff00ff },
    { x: -26, z: 4,   h: 4.5, c: 0xffd700 },
    { x: 0,   z: -28, h: 5.5, c: 0x00ffff },
    { x: 30,  z: -6,  h: 6.5, c: 0xff00ff },
    { x: -14, z: -26, h: 4, c: 0xffd700 },
  ];
  const hullMat = new THREE.MeshStandardMaterial({ color: 0x141438, emissive: 0x1a1a44, roughness: 0.7, metalness: 0.5 });

  pillars.forEach(p => {
    const base = new THREE.Mesh(new THREE.BoxGeometry(1.2, p.h, 1.2), hullMat);
    base.position.set(p.x, p.h / 2, p.z);
    scene.add(base);

    // Top ring
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(1, 0.08, 8, 24),
      new THREE.MeshBasicMaterial({ color: p.c, transparent: true, opacity: 0.8 })
    );
    ring.position.set(p.x, p.h + 0.3, p.z);
    ring.rotation.x = Math.PI / 2;
    ring.userData.baseY = p.h + 0.3;
    scene.add(ring);

    // Neon edge lines
    const eMat = new THREE.LineBasicMaterial({ color: p.c, transparent: true, opacity: 0.5 });
    [[-0.6,-0.6],[0.6,-0.6],[-0.6,0.6],[0.6,0.6]].forEach(([dx,dz]) => {
      const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(p.x+dx, 0, p.z+dz),
        new THREE.Vector3(p.x+dx, p.h, p.z+dz)
      ]);
      scene.add(new THREE.Line(geo, eMat));
    });
  });

  // ── Floating particles ──
  const pCount = 120;
  const pArr = new Float32Array(pCount * 3);
  for (let i = 0; i < pCount; i++) {
    pArr[i*3]   = (Math.random()-0.5)*120;
    pArr[i*3+1] = Math.random()*30 + 1;
    pArr[i*3+2] = (Math.random()-0.5)*120;
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.Float32BufferAttribute(pArr, 3));
  const particles = new THREE.Points(pGeo,
    new THREE.PointsMaterial({ color: 0x00ffff, size: 0.12, transparent: true, opacity: 0.35 })
  );
  scene.add(particles);

  // ── Animate ──
  const clock = new THREE.Clock();
  const rings = scene.children.filter(c => c.geometry && c.geometry.type === 'TorusGeometry');

  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Slow orbit
    camera.position.x = Math.sin(t * 0.06) * 12;
    camera.position.z = 40 + Math.cos(t * 0.04) * 8;
    camera.lookAt(0, 2, 0);

    // Rings bob
    rings.forEach(r => {
      r.position.y = r.userData.baseY + Math.sin(t * 1.2 + r.position.x * 0.3) * 0.3;
      r.rotation.z = Math.sin(t * 0.8 + r.position.x) * 0.15;
    });

    // Particles drift
    const pa = particles.geometry.attributes.position.array;
    for (let i = 0; i < pCount; i++) {
      pa[i*3+1] += 0.008;
      if (pa[i*3+1] > 32) pa[i*3+1] = 0.5;
    }
    particles.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();


// ════════════════════════════════════════════════
//  CARD ART — Neon icons
// ════════════════════════════════════════════════

function drawIcon(canvas, drawFn, color) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  ctx.fillStyle = '#040410';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(42,85,136,0.1)';
  ctx.lineWidth = 0.6;
  const step = 28;
  for (let x = 0; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Center glow
  const cr = color === '#00ffff' ? '0,255,255' : '255,0,255';
  const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.35);
  bg.addColorStop(0, `rgba(${cr},0.06)`);
  bg.addColorStop(1, 'transparent');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Draw the icon centered
  ctx.save();
  ctx.translate(W / 2, H / 2);
  drawFn(ctx, Math.min(W, H) * 0.32, color);
  ctx.restore();
}

function drawTowerIcon(ctx, s, color) {
  const cr = color === '#00ffff' ? '0,255,255' : '255,0,255';

  // Base platform
  ctx.beginPath();
  ctx.ellipse(0, s * 0.7, s * 0.5, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${cr},0.08)`;
  ctx.fill();
  ctx.strokeStyle = `rgba(${cr},0.3)`;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Stem
  ctx.fillStyle = '#141438';
  ctx.fillRect(-s * 0.06, -s * 0.2, s * 0.12, s * 0.9);
  ctx.strokeStyle = `rgba(${cr},0.35)`;
  ctx.lineWidth = 1;
  ctx.strokeRect(-s * 0.06, -s * 0.2, s * 0.12, s * 0.9);

  // Disc (the mushroom top)
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.2, s * 0.55, s * 0.18, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${cr},0.12)`;
  ctx.fill();
  ctx.strokeStyle = `rgba(${cr},0.7)`;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Second inner disc ring
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.2, s * 0.35, s * 0.11, 0, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${cr},0.35)`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Top orb
  ctx.beginPath();
  ctx.arc(0, -s * 0.38, s * 0.12, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 25;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Orb inner highlight
  ctx.beginPath();
  ctx.arc(-s * 0.03, -s * 0.41, s * 0.04, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fill();

  // Range ring (dashed circle around tower)
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.arc(0, s * 0.15, s * 0.85, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${cr},0.15)`;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawTankIcon(ctx, s, color) {
  const cr = color === '#ff00ff' ? '255,0,255' : '0,255,255';

  // Ground shadow
  ctx.beginPath();
  ctx.ellipse(0, s * 0.65, s * 0.55, s * 0.1, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${cr},0.06)`;
  ctx.fill();

  // Treads (left)
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(-s * 0.48, -s * 0.1, s * 0.13, s * 0.7);
  ctx.strokeStyle = `rgba(${cr},0.25)`;
  ctx.lineWidth = 1;
  ctx.strokeRect(-s * 0.48, -s * 0.1, s * 0.13, s * 0.7);
  // Tread detail lines
  ctx.strokeStyle = `rgba(${cr},0.1)`;
  for (let i = 1; i < 5; i++) {
    const ty = -s * 0.1 + i * (s * 0.7 / 5);
    ctx.beginPath();
    ctx.moveTo(-s * 0.48, ty);
    ctx.lineTo(-s * 0.35, ty);
    ctx.stroke();
  }

  // Treads (right)
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(s * 0.35, -s * 0.1, s * 0.13, s * 0.7);
  ctx.strokeStyle = `rgba(${cr},0.25)`;
  ctx.lineWidth = 1;
  ctx.strokeRect(s * 0.35, -s * 0.1, s * 0.13, s * 0.7);
  ctx.strokeStyle = `rgba(${cr},0.1)`;
  for (let i = 1; i < 5; i++) {
    const ty = -s * 0.1 + i * (s * 0.7 / 5);
    ctx.beginPath();
    ctx.moveTo(s * 0.35, ty);
    ctx.lineTo(s * 0.48, ty);
    ctx.stroke();
  }

  // Hull body
  ctx.fillStyle = '#141438';
  ctx.fillRect(-s * 0.35, -s * 0.05, s * 0.7, s * 0.6);
  ctx.strokeStyle = `rgba(${cr},0.45)`;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-s * 0.35, -s * 0.05, s * 0.7, s * 0.6);

  // Hull top plate
  ctx.fillStyle = '#181848';
  ctx.fillRect(-s * 0.28, 0, s * 0.56, s * 0.18);
  ctx.strokeStyle = `rgba(${cr},0.2)`;
  ctx.lineWidth = 0.8;
  ctx.strokeRect(-s * 0.28, 0, s * 0.56, s * 0.18);

  // Turret base
  ctx.beginPath();
  ctx.arc(0, s * 0.18, s * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#141438';
  ctx.fill();
  ctx.strokeStyle = `rgba(${cr},0.55)`;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Turret inner ring
  ctx.beginPath();
  ctx.arc(0, s * 0.18, s * 0.12, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${cr},0.3)`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Turret center glow
  ctx.beginPath();
  ctx.arc(0, s * 0.18, s * 0.06, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 14;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Barrel
  ctx.fillStyle = '#141438';
  ctx.fillRect(-s * 0.05, -s * 0.6, s * 0.1, s * 0.7);
  ctx.strokeStyle = `rgba(${cr},0.45)`;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-s * 0.05, -s * 0.6, s * 0.1, s * 0.7);

  // Muzzle brake
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(-s * 0.08, -s * 0.65, s * 0.16, s * 0.08);
  ctx.strokeStyle = `rgba(${cr},0.4)`;
  ctx.lineWidth = 1;
  ctx.strokeRect(-s * 0.08, -s * 0.65, s * 0.16, s * 0.08);

  // Muzzle glow
  ctx.beginPath();
  ctx.arc(0, -s * 0.65, s * 0.06, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${cr},0.3)`;
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  ctx.fill();
  ctx.shadowBlur = 0;
}

window.addEventListener('DOMContentLoaded', () => {
  drawIcon(document.getElementById('art-nd4'), drawTowerIcon, '#00ffff');
  drawIcon(document.getElementById('art-nt'), drawTankIcon, '#ff00ff');
  let t;
  window.addEventListener('resize', () => {
    clearTimeout(t);
    t = setTimeout(() => {
      drawIcon(document.getElementById('art-nd4'), drawTowerIcon, '#00ffff');
      drawIcon(document.getElementById('art-nt'), drawTankIcon, '#ff00ff');
    }, 200);
  });
});
</script>
